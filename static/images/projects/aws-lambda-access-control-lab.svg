<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">AWS Lambda access control lab overview</title>
  <desc id="desc">Three side-by-side serverless access patterns showing a public Lambda function URL, a header-gated function URL, and API Gateway with IAM authorization in front of Lambda.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6efe5" />
      <stop offset="100%" stop-color="#fffaf2" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#23443c" />
    </marker>
    <style>
      text { font-family: Georgia, "Times New Roman", serif; fill: #1e1b18; }
      .eyebrow { font-size: 20px; letter-spacing: 2px; text-transform: uppercase; fill: #61554b; }
      .title { font-size: 38px; font-weight: 700; }
      .subtitle { font-size: 22px; fill: #61554b; }
      .panel { fill: #fffaf2; stroke: #d9c9b6; stroke-width: 2; rx: 24; }
      .node { fill: #ffffff; stroke: #23443c; stroke-width: 2; rx: 16; }
      .lambda { fill: #fff1e8; stroke: #b24c2c; stroke-width: 2; rx: 16; }
      .gateway { fill: #edf5f2; stroke: #23443c; stroke-width: 2; rx: 16; }
      .label { font-size: 18px; font-weight: 700; }
      .label-tight { font-size: 16px; font-weight: 700; }
      .small { font-size: 15px; fill: #61554b; }
      .panel-title { font-size: 24px; font-weight: 700; }
      .panel-copy { font-size: 17px; fill: #61554b; }
      .center { text-anchor: middle; dominant-baseline: middle; }
      .flow-note { font-size: 15px; fill: #61554b; text-anchor: middle; }
      .flow-note-tight { font-size: 14px; fill: #61554b; text-anchor: middle; }
      .note-pill { fill: #fffaf2; stroke: #d9c9b6; stroke-width: 1.2; rx: 10; }
      .line { stroke: #23443c; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)" />
  <text x="70" y="70" class="eyebrow">Serverless Showcase</text>
  <text x="70" y="118" class="title">AWS Lambda Access Control Lab</text>
  <text x="70" y="156" class="subtitle">Same workload, three front doors, three different security boundaries.</text>

  <rect x="55" y="205" width="340" height="390" class="panel" />
  <rect x="430" y="205" width="340" height="390" class="panel" />
  <rect x="805" y="205" width="340" height="390" class="panel" />

  <text x="225" y="248" class="panel-title center">Version 1</text>
  <text x="225" y="278" class="panel-copy center">Public Lambda Function URL</text>
  <text x="202" y="316" class="flow-note">HTTPS</text>
  <rect x="95" y="330" width="84" height="70" class="node" />
  <rect x="225" y="330" width="120" height="70" class="node" />
  <rect x="225" y="450" width="120" height="70" class="lambda" />
  <text x="137" y="365" class="label center">Client</text>
  <text x="285" y="365" class="label center">
    <tspan x="285" dy="-10">Function</tspan>
    <tspan x="285" dy="22">URL</tspan>
  </text>
  <text x="285" y="485" class="label center">Lambda</text>
  <path d="M 179 365 L 225 365" class="line" />
  <path d="M 285 400 L 285 450" class="line" />
  <rect x="292" y="418" width="60" height="24" class="note-pill" />
  <text x="322" y="434" class="flow-note">invoke</text>
  <text x="225" y="557" class="small center">
    <tspan x="225" dy="0">Public edge for quick demos</tspan>
    <tspan x="225" dy="20">and low-risk content.</tspan>
  </text>

  <text x="600" y="248" class="panel-title center">Version 2</text>
  <text x="600" y="278" class="panel-copy center">Function URL + shared secret</text>
  <text x="577" y="316" class="flow-note">HTTPS</text>
  <rect x="470" y="330" width="84" height="70" class="node" />
  <rect x="600" y="330" width="120" height="70" class="node" />
  <rect x="575" y="450" width="170" height="70" class="lambda" />
  <text x="512" y="365" class="label center">Client</text>
  <text x="660" y="365" class="label center">
    <tspan x="660" dy="-10">Function</tspan>
    <tspan x="660" dy="22">URL</tspan>
  </text>
  <text x="660" y="485" class="label-tight center">
    <tspan x="660" dy="-10">Lambda</tspan>
    <tspan x="660" dy="20">+ header gate</tspan>
  </text>
  <path d="M 554 365 L 600 365" class="line" />
  <path d="M 660 400 L 660 450" class="line" />
  <rect x="667" y="418" width="60" height="24" class="note-pill" />
  <text x="697" y="434" class="flow-note">invoke</text>
  <text x="600" y="557" class="small center">
    <tspan x="600" dy="0">Lightweight gating with</tspan>
    <tspan x="600" dy="20">validation inside code.</tspan>
  </text>

  <text x="975" y="248" class="panel-title center">Version 3</text>
  <text x="975" y="278" class="panel-copy center">API Gateway HTTP API + IAM</text>
  <text x="942" y="308" class="flow-note-tight">
    <tspan x="942" dy="0">HTTPS</tspan>
    <tspan x="942" dy="16">+ SigV4</tspan>
  </text>
  <rect x="845" y="330" width="84" height="70" class="node" />
  <rect x="955" y="330" width="180" height="70" class="gateway" />
  <rect x="985" y="450" width="120" height="70" class="lambda" />
  <text x="887" y="365" class="label center">Client</text>
  <text x="1045" y="365" class="label center">
    <tspan x="1045" dy="-10">API Gateway</tspan>
    <tspan x="1045" dy="22">IAM auth</tspan>
  </text>
  <text x="1045" y="485" class="label center">Lambda</text>
  <path d="M 929 365 L 955 365" class="line" />
  <path d="M 1045 400 L 1045 450" class="line" />
  <rect x="1052" y="418" width="60" height="24" class="note-pill" />
  <text x="1082" y="434" class="flow-note">invoke</text>
  <text x="975" y="557" class="small center">
    <tspan x="975" dy="0">IAM is enforced at the edge</tspan>
    <tspan x="975" dy="20">before Lambda runs.</tspan>
  </text>
</svg>
