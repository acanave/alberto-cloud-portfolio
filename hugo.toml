[params.about]
enable = true
title = "About Me"
image = "/images/alberto-profile.png"
content = """
Cloud Engineer with hands-on experience building secure AWS infrastructure using Terraform, CloudFormation, IAM, ECS, and CI/CD. My work centers on reusable infrastructure, cloud networking, least-privilege access, and dependable delivery across AWS and hybrid environments.

Alongside cloud engineering, I bring a systems background in identity, endpoint, and platform operations. That blend helps me improve reliability through hardening, remediation, documentation, and clear operational standards.
"""

