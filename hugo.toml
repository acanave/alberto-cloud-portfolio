[[params.experience.items.jobs]]
name = "System Engineer"
date = "Oct 2023 - Present"
content = """
- Ran hybrid infrastructure across servers, networking, Linux, and identity services with an emphasis on secure, repeatable platform operations.
- Applied least-privilege access, MFA, and policy standards to strengthen governance and reduce risk across user and infrastructure access.
- Investigated authentication, network, and system incidents at the root-cause level, then introduced preventive fixes to reduce recurring failures.
- Led refresh, remediation, migration, and rebuild efforts through controlled change management to keep production systems stable.
- Hardened Linux systems and patch workflows against CIS Controls, NIST guidance, and ISO 27001 expectations while improving audit readiness.
- Created architecture diagrams, SOPs, and SharePoint-backed Copilot knowledge workflows to make support more consistent and scalable.
"""

[[params.experience.items]]
company = "CloudFracture"
companyUrl = "#"

[[params.experience.items.jobs]]
name = "Cloud Engineer - Independent Contractor"
date = "Apr 2023 - Present"
content = """
- Built GitHub Actions pipelines to lint, plan, review, and deploy Terraform across multi-account AWS environments.
- Used OIDC-based role assumption and environment approvals to strengthen release security and reduce manual deployment effort.
- Provisioned AWS infrastructure across IAM, EC2, S3, networking, and account baselines using reusable Terraform modules and standardized templates.
- Enforced Git-based change management with branches, pull requests, reviews, and deployment gates to improve traceability and reduce drift.
- Implemented landing zone automation with AWS Control Tower and CloudFormation to speed account onboarding and baseline governance.
"""

